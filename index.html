<!DOCTYPE html>
<html>
<head>
  <title>VR Furniture Room</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <!-- Sky -->
  <a-sky color="#ECECEC"></a-sky>

  <!-- Floor -->
  <a-plane 
      rotation="-90 0 0" 
      width="10" 
      height="10" 
      color="#7BC8A4">
  </a-plane>

  <!-- Walls -->
  <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#FFFFFF"></a-box>
  <a-box position="-5 2 0" width="0.2" height="4" depth="10" color="#FFFFFF"></a-box>
  <a-box position="5 2 0" width="0.2" height="4" depth="10" color="#FFFFFF"></a-box>

  <!-- Sofa -->
  <a-entity 
      gltf-model="models/sofa.glb"
      position="0 0 -3"
      scale="1 1 1">
  </a-entity>

  <!-- Table -->
  <a-entity 
      gltf-model="models/table.glb"
      position="0 0 -1"
      scale="1 1 1">
  </a-entity>

  <!-- Chair -->
  <a-entity 
      gltf-model="models/chair.glb"
      position="2 0 -2"
      scale="1 1 1">
  </a-entity>

  <!-- Camera -->
  <a-entity position="0 1.6 3">
      <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>

</body>
</html>
